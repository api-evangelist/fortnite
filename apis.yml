features:
  - name: Player Lifetime Stats
    description: >-
      Lifetime aggregate Battle Royale statistics (matches, wins, kills, K/D,
      score) per platform and username.
  - name: Regional Leaderboards
    description: >-
      Top players by platform and region across global, NA, EU, and OCE
      cohorts.
  - name: Power Rankings
    description: >-
      Competitive power rankings tracking professional Fortnite players' point
      totals across events.
  - name: Store Rotation
    description: >-
      Snapshot of the rotating in-game item shop (daily and weekly storefronts)
      with prices in vBucks.
  - name: Weekly Challenges
    description: >-
      Current Battle Pass weekly challenges list with completion criteria and
      rewards.
useCases:
  - name: Competitive Esports Dashboards
    description: >-
      Aggregate professional player power-ranking standings into competitive
      Fortnite leaderboard sites and event broadcast graphics.
  - name: Player Profile Widgets
    description: >-
      Embed lifetime player stat cards into community sites, Discord bots, and
      streaming overlays.
  - name: Store Tracking Bots
    description: >-
      Poll the store endpoint on a schedule to notify players when specific
      cosmetics or returning skins appear in the daily rotation.
integrations:
  - name: Epic Games Fortnite
    description: >-
      Upstream source of all player telemetry; Tracker Network ingests Epic's
      player data and exposes a developer surface on top of it.
  - name: Discord Bots
    description: >-
      Common consumer of the profile and store endpoints to render player
      cards and shop rotations in Discord servers.
  - name: Streaming Overlays
    description: >-
      OBS and Streamlabs overlay widgets pull live stats from the profile
      endpoint during Fortnite streams.
solutions:
  - name: Tracker Network Site Family
    description: >-
      fortnitetracker.com is one of several Tracker Network properties
      (overwatch.tracker.gg, apex.tracker.gg, valorant.tracker.gg) that wrap
      game-publisher telemetry behind a uniform TRN-Api-Key surface.
