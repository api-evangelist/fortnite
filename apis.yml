aid: fortnite
name: Fortnite Tracker
description: >-
  Fortnite Tracker, by Tracker Network, exposes a small REST API surface
  (api.fortnitetracker.com/v1) covering player profile lifetime stats, regional
  leaderboards, competitive power rankings, the rotating in-game store, and the
  weekly challenges feed for Fortnite. Authentication is a single TRN-Api-Key
  header obtained from the Fortnite Tracker site. The service has reached a
  silent end-of-life in recent years (some endpoints are intermittently
  unavailable) but remains the canonical community profile of how Tracker
  Network packages Epic Games' Fortnite telemetry as a developer API.
