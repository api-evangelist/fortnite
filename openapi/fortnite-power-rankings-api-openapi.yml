openapi: 3.0.3
info:
  title: Fortnite Tracker Challenges Power Rankings API
  version: '1.0'
  description: Fortnite Tracker (api.fortnitetracker.com/v1) is the Tracker Network developer surface that wraps Epic Games' Fortnite telemetry behind a simple REST API. It exposes per-player lifetime statistics, regional leaderboards, competitive power rankings, the daily/weekly in-game store rotation, and the current week's Battle Pass challenges. Every call requires a TRN-Api-Key header issued from fortnitetracker.com/site-api/create. The service is intentionally rate-limited (about one request every two seconds per key) and has been in a silent end-of-life state for several years — some endpoints may return intermittent errors.
  contact:
    name: Tracker Network Support
    url: https://feedback.tracker.gg/
  license:
    name: Tracker Network Terms of Service
    url: https://tracker.gg/about/terms
  x-generated-from: documentation
  x-last-validated: '2026-05-30'
servers:
- url: https://api.fortnitetracker.com/v1
  description: Fortnite Tracker production API
security:
- trnApiKey: []
tags:
- name: Power Rankings
  description: Competitive Fortnite power rankings across professional events.
paths:
  /powerrankings/top500:
    get:
      operationId: listTopPowerRankings
      summary: Fortnite Tracker List Top 500 Power Rankings
      description: Retrieve the top 500 ranked professional Fortnite players globally as ranked by Tracker Network's competitive power-ranking algorithm.
      tags:
      - Power Rankings
      responses:
        '200':
          description: Power ranking list retrieved.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PowerRankingEntry'
              examples:
                ListTopPowerRankings200Example:
                  summary: Default listTopPowerRankings 200 response
                  x-microcks-default: true
                  value:
                  - rank: 1
                    country: US
                    platform: pc
                    region: na-east
                    epicNickname: Bugha
                    points: 12500.5
                    earnings: $3,000,000
                    twitchUrl: https://twitch.tv/bugha
                  - rank: 2
                    country: GB
                    platform: pc
                    region: eu
                    epicNickname: Mongraal
                    points: 12100.0
                    earnings: $1,800,000
                    twitchUrl: https://twitch.tv/mongraal
        '401':
          description: Missing or invalid TRN-Api-Key header.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ListTopPowerRankings401Example:
                  summary: Default listTopPowerRankings 401 response
                  x-microcks-default: true
                  value:
                    error: unauthorized
                    message: Missing or invalid TRN-Api-Key header.
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ListTopPowerRankings429Example:
                  summary: Default listTopPowerRankings 429 response
                  x-microcks-default: true
                  value:
                    error: rate_limited
                    message: Rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /powerrankings/{platform}/{region}/{epicNickname}:
    get:
      operationId: getPlayerPowerRanking
      summary: Fortnite Tracker Get Player Power Ranking
      description: Retrieve the competitive power-ranking detail for a specific professional player, scoped to platform and region.
      tags:
      - Power Rankings
      parameters:
      - name: platform
        in: path
        required: true
        description: Player platform (`pc`, `xbl`, `psn`).
        schema:
          type: string
          enum:
          - pc
          - xbl
          - psn
        example: pc
      - name: region
        in: path
        required: true
        description: Competitive region.
        schema:
          type: string
          enum:
          - na-east
          - na-west
          - eu
          - oce
          - br
          - asia
          - me
        example: na-east
      - name: epicNickname
        in: path
        required: true
        description: Epic Games account display name.
        schema:
          type: string
        example: Bugha
      responses:
        '200':
          description: Power ranking detail retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PowerRankingDetail'
              examples:
                GetPlayerPowerRanking200Example:
                  summary: Default getPlayerPowerRanking 200 response
                  x-microcks-default: true
                  value:
                    rank: 1
                    country: US
                    platform: pc
                    region: na-east
                    epicNickname: Bugha
                    points: 12500.5
                    earnings: $3,000,000
                    twitchUrl: https://twitch.tv/bugha
                    events:
                    - name: FNCS Chapter 5 Season 2 Finals
                      date: '2026-04-12'
                      points: 1500
                      placement: 3
                    - name: Cash Cup Extra NA East
                      date: '2026-04-26'
                      points: 800
                      placement: 1
        '401':
          description: Missing or invalid TRN-Api-Key header.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                GetPlayerPowerRanking401Example:
                  summary: Default getPlayerPowerRanking 401 response
                  x-microcks-default: true
                  value:
                    error: unauthorized
                    message: Missing or invalid TRN-Api-Key header.
        '404':
          description: Player power-ranking entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                GetPlayerPowerRanking404Example:
                  summary: Default getPlayerPowerRanking 404 response
                  x-microcks-default: true
                  value:
                    error: not_found
                    message: Power ranking entry not found for player.
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                GetPlayerPowerRanking429Example:
                  summary: Default getPlayerPowerRanking 429 response
                  x-microcks-default: true
                  value:
                    error: rate_limited
                    message: Rate limit exceeded.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    PowerRankingEntry:
      type: object
      description: A single competitive power-ranking row.
      properties:
        rank:
          type: integer
          description: Global rank position.
          example: 1
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code.
          example: US
        platform:
          type: string
          description: Player platform (`pc`, `xbl`, `psn`).
          example: pc
        region:
          type: string
          description: Competitive region code.
          example: na-east
        epicNickname:
          type: string
          description: Player Epic Games display name.
          example: Bugha
        points:
          type: number
          format: float
          description: Power-ranking points total.
          example: 12500.5
        earnings:
          type: string
          description: Tournament earnings as a display string (USD).
          example: $3,000,000
        twitchUrl:
          type: string
          format: uri
          description: Twitch channel URL for the player when known.
          example: https://twitch.tv/bugha
    Error:
      type: object
      description: Standard error response body.
      properties:
        error:
          type: string
          description: Short machine-readable error code.
          example: unauthorized
        message:
          type: string
          description: Human-readable error description.
          example: Missing or invalid TRN-Api-Key header.
    PowerRankingDetail:
      allOf:
      - $ref: '#/components/schemas/PowerRankingEntry'
      - type: object
        description: Power ranking entry with event-level breakdown.
        properties:
          events:
            type: array
            description: List of qualifying tournament events.
            items:
              type: object
              properties:
                name:
                  type: string
                  description: Tournament name.
                  example: FNCS Chapter 5 Season 2 Finals
                date:
                  type: string
                  format: date
                  description: Event date.
                  example: '2026-04-12'
                points:
                  type: number
                  format: float
                  description: Power-ranking points awarded.
                  example: 1500
                placement:
                  type: integer
                  description: Final placement at the event.
                  example: 3
  securitySchemes:
    trnApiKey:
      type: apiKey
      in: header
      name: TRN-Api-Key
      description: Per-account API key issued from https://fortnitetracker.com/site-api/create. Pass as the `TRN-Api-Key` request header. Default rate limit is approximately one request per two seconds per key.
